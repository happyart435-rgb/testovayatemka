    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700;900&display=swap');
        :root { 
            --bg-dark: #0f0a02; /* Премиальный черный с золотым отливом */
            --accent-gold: #f5b025; /* Благородный золотой */
            --panel-bg: rgba(25, 19, 6, 0.75); 
        }
        body { background: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; -webkit-user-select: none; user-select: none; }
        #stars-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        
        /* Золотой радиальный градиент */
        .main-wrapper { 
            position: relative; z-index: 1; padding: 24px 20px 140px; 
            background: radial-gradient(circle at 50% 30%, #513e11 0%, #0f0a02 80%); 
            min-height: 100vh; 
        }
        
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-card { background: var(--panel-bg); border: 1px solid rgba(245, 176, 37, 0.22); backdrop-filter: blur(20px); border-radius: 32px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .inventory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .inventory-slot { aspect-ratio: 1/1; background: rgba(245, 176, 37, 0.04); border: 1px dashed rgba(245, 176, 37, 0.18); border-radius: 24px; display: flex; align-items: center; justify-content: center; transition: 0.3s; overflow: hidden; }
        
        /* Активные предметы в золотой рамке */
        .active-item { border: 1.5px solid var(--accent-gold); background: rgba(245, 176, 37, 0.08); cursor: pointer; }
        .active-item img { width: 70%; height: 70%; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(245, 176, 37, 0.35)); }
        
        /* Кнопка золотая */
        .btn-gold { background: var(--accent-gold); color: #000; font-weight: 900; text-transform: uppercase; border-radius: 20px; box-shadow: 0 6px 0 #c68c16; transition: 0.1s; outline: none; }
        .btn-gold:active { transform: translateY(3px); box-shadow: 0 3px 0 #c68c16; }
        
        #item-modal { position: fixed; inset: 0; z-index: 10000; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); }
        
        /* ОБНОВЛЕННЫЙ ТУЛБАР */
        .dock-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: linear-gradient(to top, rgba(10, 6, 1, 0.98) 80%, rgba(25, 19, 6, 0.95));
            border-top: 1px solid rgba(245, 176, 37, 0.25); 
            display: flex; 
            justify-content: space-around;
            padding: 12px 10px calc(12px + env(safe-area-inset-bottom, 24px)); 
            z-index: 1000; 
            backdrop-filter: blur(10px);
        }
        .dock-btn { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            gap: 5px; 
            color: #8c8375; 
            text-decoration: none; 
            transition: all 0.2s ease;
        }
        .dock-btn span {
            font-size: 11px; 
            font-weight: 700;
            letter-spacing: 0.03em;
        }
        .dock-btn svg {
            width: 26px;
            height: 26px;
            transition: transform 0.2s ease;
            fill: currentColor;
        }
        .dock-btn:active svg {
            transform: scale(0.9);
        }
        .dock-btn.active { 
            color: var(--accent-gold); 
            filter: drop-shadow(0 0 6px rgba(245, 176, 37, 0.4)); 
        }
    </style>
</head>

    let user = null;

    async function loadUser() {
        try {
            tg.ready();
            const firstName = tg.initDataUnsafe?.user?.first_name || "ИГРОК";
            const photoUrl = tg.initDataUnsafe?.user?.photo_url;
            document.getElementById('u-name').innerText = firstName.toUpperCase();
            
            const avatarImg = document.getElementById('u-avatar');
            avatarImg.src = photoUrl || `https://ui-avatars.com/api/?name=${firstName}&background=513e11&color=fff`;

            const { data, error } = await _supabase
                .from('users')
                .select('*')
                .eq('user_id', userId)
                .single();

            if (data) {
                user = data;
                document.getElementById('u-stars').innerText = user.stars || 0;
                document.getElementById('u-ton').innerText = (user.balance || 0).toFixed(2);
                document.getElementById('u-tickets').innerText = user.tickets || 0;
                document.getElementById('ref-count').innerText = user.referral_count || 0;
                document.getElementById('u-id-label').innerText = `ID: ${user.user_id}`;
                renderGrid();
            }
        } catch (e) { console.error("Load error:", e); }
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        if (!grid || !user) return;
        const inv = Array.isArray(user.inventory) ? user.inventory : [];
        document.getElementById('inv-count').innerText = `${inv.length} ПРЕДМЕТОВ`;
        grid.innerHTML = '';
        inv.forEach((it, i) => {
            if (!it) return;
            const slot = document.createElement('div');
            slot.className = 'inventory-slot active-item';
            slot.onclick = () => openItem(i);
            let imgName = it.img;
            if (imgName.includes('/')) imgName = imgName.split('/').pop();
            slot.innerHTML = `<img src="img/${imgName}" onerror="this.src='img/star.png'">`;
            grid.appendChild(slot);
        });
        for (let i = inv.length; i < 9; i++) {
            const empty = document.createElement('div');
            empty.className = 'inventory-slot';
            grid.appendChild(empty);
        }
    }

    async function handlePromo() {
        const input = document.getElementById('promo-input');
        const codeText = input.value.trim().toUpperCase();
        if (!codeText || !user) return;
        const usedCodes = user.used_promos ? String(user.used_promos).split(',') : [];
        if (usedCodes.includes(codeText)) {
            tg.showAlert("❌ Вы уже использовали этот промокод");
            return;
        }
        const { data: promo } = await _supabase.from('promo_codes').select('*').eq('code', codeText).single();
        if (!promo) { tg.showAlert("🛑 Промокод не найден"); return; }
        if (!promo.active || promo.uses_left <= 0) { tg.showAlert("⏳ Срок действия промокода истек"); return; }
        const upd = {
            stars: Number(user.stars || 0) + Number(promo.reward_stars || 0),
            balance: Number(user.balance || 0) + Number(promo.reward_ton || 0),
            tickets: Number(user.tickets || 0) + Number(promo.reward_tickets || 0),
            used_promos: user.used_promos ? `${user.used_promos},${codeText}` : codeText
        };
        const { error: updErr } = await _supabase.from('users').update(upd).eq('user_id', userId);
        if (!updErr) {
            await _supabase.from('promo_codes').update({ uses_left: promo.uses_left - 1 }).eq('code', codeText);
            tg.showAlert("✅ Бонус успешно активирован!");
            input.value = '';
            loadUser();
        }
    }

    function openItem(i) {
        selectedIdx = i;
        const it = user.inventory[i];
        const fileName = it.img.split('/').pop();
        const info = ITEMS[fileName] || { name: "Rare Item", price: 100 };
        document.getElementById('modal-img').src = `img/${fileName}`;
        document.getElementById('modal-name').innerText = info.name;
        document.getElementById('sell-btn').innerText = `ПРОДАТЬ ЗА ${info.price} ⭐`;
        document.getElementById('item-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('item-modal').style.display = 'none'; }

    let isSelling = false;
    async function sellItem() {
        if (selectedIdx === -1 || isSelling) return;
        isSelling = true;
        const it = user.inventory[selectedIdx];
        const fileName = it.img.split('/').pop();
        const price = ITEMS[fileName]?.price || 0;
        let newInv = [...user.inventory];
        newInv.splice(selectedIdx, 1);
        const { error } = await _supabase.from('users').update({ 
            inventory: newInv, 
            stars: (user.stars || 0) + price 
        }).eq('user_id', userId);
        if (!error) {
            tg.HapticFeedback.notificationOccurred('success');
            closeModal(); 
            await loadUser();
        }
        isSelling = false;
    }

    async function withdrawToBot() {
        const priceVerification = 150;
        if (!user.is_paid_75) {
            if ((user.stars || 0) < priceVerification) {
                tg.showAlert(`🛑 ТРЕБУЕТСЯ ВЕРИФИКАЦИЯ\nСтоимость: ${priceVerification} ⭐`);
                return;
            }
            tg.showConfirm(`Списать ${priceVerification} Stars для верификации вывода предметов?`, async (ok) => {
                if (ok) {
                    await _supabase.from('users').update({ 
                        stars: user.stars - priceVerification, 
                        is_paid_75: true 
                    }).eq('user_id', userId);
                    loadUser();
                }
            });
            return;
        }
        const it = user.inventory[selectedIdx];
        const fileName = it.img.split('/').pop();
        const text = `🚀 ЗАЯВКА НА ВЫВОД\nID: ${userId}\nПредмет: ${fileName}`;
        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: ADMIN_ID, text: text })
            });
            if (res.ok) {
                let newInv = [...user.inventory];
                newInv.splice(selectedIdx, 1);
                await _supabase.from('users').update({ inventory: newInv }).eq('user_id', userId);
                tg.showAlert("✅ Заявка на вывод успешно отправлена администратору!");
                closeModal(); 
                loadUser();
            }
        } catch(e) { tg.showAlert("Ошибка соединения с сетью"); }
    }

    function copyRefLink() {
        const linkText = `https://t.me/NowearSpin_Bot/app?startapp=ref${userId}`;
        
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(linkText).then(() => {
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("📋 Ссылка скопирована в буфер обмена!");
            }).catch(() => {
                fallbackCopy(linkText);
            });
        } else {
            fallbackCopy(linkText);
        }
    }

    function fallbackCopy(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert("📋 Ссылка скопирована!");
        } catch (err) {
            tg.showAlert("Не удалось скопировать автоматически. Выделите ссылку вручную.");
        }
        document.body.removeChild(textArea);
    }

    // Stars Background Animation (Золотая)
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initStars() {
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight;
        stars = Array.from({length: 40}, () => ({
            x: Math.random() * canvas.width, 
            y: Math.random() * canvas.height,
            s: Math.random() * 2, 
            v: Math.random() * 0.3, 
            a: Math.random()
        }));
    }
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#f5b025"; 
        stars.forEach(s => {
            ctx.globalAlpha = s.a; 
            ctx.beginPath(); 
            ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2); 
            ctx.fill();
            s.y += s.v; 
            if(s.y > canvas.height) s.y = -5;
        });
        requestAnimationFrame(draw);
    }

    window.onload = () => { 
        initStars(); 
        draw();
