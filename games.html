<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NowearSpin Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --bg: #0d0a05;
            --accent: #d4af37;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #0d0a05;
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 100;
            height: 65px;
        }

        .logo { 
            font-weight: 900; 
            font-size: 1.4rem; 
            text-transform: uppercase; 
            font-style: italic;
            margin-left: 12px;
        }

        .games-list {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .game-card {
            height: calc(100vh - 65px);
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .image-container {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, transparent 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .game-img {
            width: 90%;
            filter: drop-shadow(0 0 25px var(--accent));
        }

        .btn-play {
            background: var(--accent);
            color: #0d0a05;
            font-weight: 900;
            padding: 16px 70px;
            border-radius: 18px;
            text-transform: uppercase;
            font-size: 1.2rem;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
            border: none;
            cursor: pointer;
            margin-top: 50px; /* Кнопки стали ниже */
        }

        .btn-play:active { transform: scale(0.95); }
        .games-list::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="flex items-center justify-center w-8 h-8 rounded-full bg-[#111] border border-[rgba(212,175,55,0.3)] active:scale-90 transition-transform flex-shrink-0">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        
        <div class="logo">
            <span class="text-[#d4af37]">NOWEAR</span><span class="text-white">SPIN</span>
        </div>
    </header>

    <div class="games-list">

        <section class="game-card">
            <div class="image-container">
                <img src="mine.png" class="game-img">
            </div>
            <button onclick="launch('mines.html')" class="btn-play">Играть</button>
        </section>

        <section class="game-card">
            <div class="image-container">
                <img src="plinko.png" class="game-img">
            </div>
            <button onclick="launch('plinko.html')" class="btn-play">Играть</button>
        </section>

    </div>

    <script>
        let tg = window.Telegram.WebApp;
        
        function launch(file) {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('heavy');
            }
            console.log("Запуск:", file);
            window.location.replace("./" + file);
        }

        tg.expand();
    </script>
</body>
</html>
